name: anythingllm

networks:
  anything-llm:
    driver: bridge

services:
  anything-llm:
    container_name: anythingllm
    build:
      context: ../.
      dockerfile: ./docker/Dockerfile
      args:
        ARG_UID: ${UID:-1000}
        ARG_GID: ${GID:-1000}
    cap_add:
      - SYS_ADMIN
    volumes:
      # Mount your existing storage directory from the pre-built image
      # Change this path to match where your data is stored
      - "${STORAGE_LOCATION:-$HOME/anythingllm}:/app/server/storage"
      - "${STORAGE_LOCATION:-$HOME/anythingllm}/.env:/app/server/.env"
      # Host directory accessible to the filesystem agent (inside anythingllm-fs)
      - "/Users/sean/Developer/xgitlab/meis:/app/server/storage/anythingllm-fs/meis"
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8031:3001"
    environment:
      - STORAGE_DIR=/app/server/storage
    networks:
      - anything-llm
    extra_hosts:
      - "host.docker.internal:host-gateway"
